// 在結帳頁面的 JS
const cartList = document.querySelector('.cart-items-list');
const grandTotalDisplay = document.getElementById('grandTotal');

// 核心功能一：印出購物車清單
function renderCart() {
  // 1. 讀取記憶
  let cart = JSON.parse(localStorage.getItem('dotPlanCart')) || [];
  
  // 2. 清空畫面原本的內容
  cartList.innerHTML = '';

  // 3. 如果購物車是空的
  if (cart.length === 0) {
    cartList.innerHTML = '<p style="text-align:center; padding: 20px;">購物車目前空空的喔！去逛逛吧～</p>';
    grandTotalDisplay.textContent = 'NT$ 0';
    return;
  }

  // 4. 依照記憶中的資料，一條一條印出 HTML
  cart.forEach((item, index) => {
    const html = `
      <div class="cart-item" data-index="${index}">
        <img src="${item.image}" alt="${item.name}" class="item-img">
        <div class="item-info">
          <h4 class="item-name">${item.name}</h4>
          <p class="item-price" data-price="${item.price}">單價：NT$ ${item.price}</p>
        </div>
        <div class="item-quantity">
          <button class="qty-btn minus-btn">−</button>
          <input type="number" class="qty-input" value="${item.quantity}" min="1">
          <button class="qty-btn plus-btn">+</button>
        </div>
        <div class="item-subtotal">NT$ ${item.price * item.quantity}</div>
        <button class="remove-btn" aria-label="移除商品">✖</button>
      </div>
    `;
    // 把這段 HTML 塞進清單容器裡
    cartList.insertAdjacentHTML('beforeend', html);
  });

  // 印完之後計算總金額
  updateCartTotal();
}

// 核心功能二：計算總金額 (維持原本的邏輯即可)
function updateCartTotal() {
  const cartItems = document.querySelectorAll('.cart-item');
  let total = 0;
  cartItems.forEach(item => {
    const price = parseFloat(item.querySelector('.item-price').dataset.price);
    const quantity = parseInt(item.querySelector('.qty-input').value);
    item.querySelector('.item-subtotal').textContent = `NT$ ${price * quantity}`;
    total += (price * quantity);
  });
  grandTotalDisplay.textContent = `NT$ ${total}`;
}

// 核心功能三：儲存結帳頁面的數量變更回 localStorage
function saveCartState() {
  const cartItems = document.querySelectorAll('.cart-item');
  let cart = JSON.parse(localStorage.getItem('dotPlanCart')) || [];
  
  cartItems.forEach(item => {
    const index = item.dataset.index; // 抓取是陣列中的第幾個
    const quantity = parseInt(item.querySelector('.qty-input').value);
    if(cart[index]) {
      cart[index].quantity = quantity; // 更新陣列中的數量
    }
  });
  
  localStorage.setItem('dotPlanCart', JSON.stringify(cart));
}

// 綁定事件 (加減數量與刪除)
cartList.addEventListener('click', function(event) {
  const target = event.target;
  const cartItem = target.closest('.cart-item'); 
  if (!cartItem) return;

  const qtyInput = cartItem.querySelector('.qty-input');
  let currentQty = parseInt(qtyInput.value);

  if (target.classList.contains('plus-btn')) {
    qtyInput.value = currentQty + 1;
    updateCartTotal();
    saveCartState(); // 記得存檔
  }

  if (target.classList.contains('minus-btn')) {
    if (currentQty > 1) {
      qtyInput.value = currentQty - 1;
      updateCartTotal();
      saveCartState(); // 記得存檔
    }
  }

  if (target.classList.contains('remove-btn')) {
    // 從陣列中刪除該項目
    let cart = JSON.parse(localStorage.getItem('dotPlanCart')) || [];
    const index = cartItem.dataset.index;
    cart.splice(index, 1); // 刪除一筆資料
    localStorage.setItem('dotPlanCart', JSON.stringify(cart));
    
    // 重新印出畫面
    renderCart(); 
  }
});

// 網頁載入時，執行第一次印出清單
renderCart();
