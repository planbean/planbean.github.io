        <script>



// 取得所有的按鈕和輸入框
// 1. 選取畫面上所有的商品卡片
const productCards = document.querySelectorAll('.product-card');

// 2. 針對每一個商品卡片，分別設定它們專屬的數量按鈕功能
productCards.forEach(card => {
  // 注意：這裡是用 card.querySelector，只在「當前這個卡片」裡面找元素
  const minusBtn = card.querySelector('.minus-btn');
  const plusBtn = card.querySelector('.plus-btn');
  const qtyInput = card.querySelector('.qty-input');

  // 點擊「減少」按鈕
  minusBtn.addEventListener('click', () => {
    let currentValue = parseInt(qtyInput.value);
    // 確保數量不會小於 1
    if (currentValue > 1) {
      qtyInput.value = currentValue - 1;
    }
  });

  // 點擊「增加」按鈕
  plusBtn.addEventListener('click', () => {
    let currentValue = parseInt(qtyInput.value);
    // 可以設定一個最大值，例如最多買 99 個
    if (currentValue < 99) {
      qtyInput.value = currentValue + 1;
    }
  });

  // 防呆：防止使用者手動輸入負數或非數字
  qtyInput.addEventListener('change', () => {
    let currentValue = parseInt(qtyInput.value);
    if (isNaN(currentValue) || currentValue < 1) {
      qtyInput.value = 1; // 如果亂輸入，就強制恢復為 1
    }
  });
});


// 在商品頁的 JS
const addToCartBtns = document.querySelectorAll('.add-to-cart-btn');

addToCartBtns.forEach(btn => {
  btn.addEventListener('click', (e) => {
    // 1. 抓取被點擊的那個商品卡片
    const card = e.target.closest('.product-card');
    
    // 2. 收集商品資訊
    const product = {
      id: card.dataset.id,
      name: card.dataset.name,
      price: parseInt(card.dataset.price),
      image: card.dataset.image,
      quantity: parseInt(card.querySelector('.qty-input').value)
    };

    // 3. 從瀏覽器記憶中拿出舊的購物車清單 (如果是空的就建立空陣列 [])
    let cart = JSON.parse(localStorage.getItem('dotPlanCart')) || [];

    // 4. 檢查購物車裡是不是已經有這個商品了？
    const existingItem = cart.find(item => item.id === product.id);
    
    if (existingItem) {
      existingItem.quantity += product.quantity; // 有的話，數量累加
    } else {
      cart.push(product); // 沒有的話，新增進去
    }

    // 5. 將更新後的購物車清單，存回瀏覽器記憶中
    localStorage.setItem('dotPlanCart', JSON.stringify(cart));

    // (選擇性) 這裡可以加上你之前寫好的「打開購物車側邊欄」的程式碼
    alert(`已將 ${product.quantity} 個 ${product.name} 加入購物車！`);
  });
});
